# Vhost nginx cho trang chấm điểm hackathon.
#
# Cài đặt trên VPS:
#   cp deploy/nginx/fa-hackathon-judges.com.conf /etc/nginx/sites-available/fa-hackathon-judges.com
#   ln -s /etc/nginx/sites-available/fa-hackathon-judges.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d fa-hackathon-judges.com -d www.fa-hackathon-judges.com
#
# certbot sẽ tự thêm block `listen 443 ssl` + đường dẫn chứng chỉ vào file này
# và tự chuyển hướng 80 -> 443. Không sửa tay phần nó sinh ra.
#
# LƯU Ý: server này đang chạy sẵn nhiều site khác. Tuyệt đối không cài thêm
# web server thứ hai (Caddy/Apache) — sẽ tranh port 80 và làm sập toàn bộ.

server {
    listen 80;
    listen [::]:80;
    server_name fa-hackathon-judges.com www.fa-hackathon-judges.com;

    # Ảnh logo/thành viên được lưu base64 thẳng trong DB nên body POST có thể
    # tới vài trăm KB. Mặc định 1m sẽ trả 413 khi admin upload ảnh.
    client_max_body_size 10m;

    # Bảng điểm realtime dùng SSE ở /api/stream. Nginx mặc định buffer response
    # nên nếu thiếu 3 dòng dưới, bảng trên màn hình lớn sẽ đứng im không cập nhật.
    location /api/stream {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        '';

        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    location / {
        # 3100 vì port 3000 đã bị một app khác trên máy chiếm.
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
